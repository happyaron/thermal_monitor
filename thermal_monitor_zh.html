<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>温度监控</title>
<style>
  :root {
    --bg:       #1a1a2e;
    --surface:  #16213e;
    --border:   #0f3460;
    --text:     #e0e0e0;
    --dim:      #7a7a9a;
    --ok:       #4ade80;
    --warn:     #facc15;
    --crit:     #f87171;
    --err:      #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "SF Mono", "Cascadia Code", Menlo, monospace;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── 页眉 ──────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    padding: 20px 24px 12px;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
  .meta { display: flex; gap: 20px; font-size: 12px; color: var(--dim); }
  .meta span { display: inline-flex; align-items: center; gap: 5px; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--ok); display: inline-block;
  }
  .dot.stale { background: var(--warn); }
  .dot.error { background: var(--crit); }

  /* ── 摘要栏 ─────────────────────────────────────── */
  .summary {
    display: flex;
    gap: 16px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    flex-wrap: wrap;
  }
  .summary .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .chip .n { font-weight: 700; font-size: 16px; }
  .chip.ok   .n { color: var(--ok); }
  .chip.warn .n { color: var(--warn); }
  .chip.crit .n { color: var(--crit); }
  .chip.err  .n { color: var(--err); }

  /* ── 控制栏 ────────────────────────────────────────── */
  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 24px;
    font-size: 12px;
    color: var(--dim);
  }
  .controls label { display: flex; align-items: center; gap: 6px; }
  .controls select, .controls input[type=text] {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 8px;
    font-family: inherit;
    font-size: 12px;
  }
  .controls button {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 10px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
  }
  .controls button:hover { border-color: var(--text); }

  /* ── 表格 ───────────────────────────────────────────── */
  .table-wrap { padding: 8px 24px 24px; }
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--dim);
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  th:hover { color: var(--text); }
  /* 列宽 */
  th:nth-child(1), td:nth-child(1) { width: 40%; }
  th:nth-child(2), td:nth-child(2) { width: 15%; text-align: right; }
  th:nth-child(3), td:nth-child(3) { width: 12%; text-align: right; }
  th:nth-child(4), td:nth-child(4) { width: 12%; text-align: right; }
  th:nth-child(5), td:nth-child(5) { width: 21%; }

  /* 数据源行 */
  tr.source td {
    padding: 7px 10px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  tr.source:hover td { background: rgba(255,255,255,0.03); }
  tr.source.expandable { cursor: pointer; }

  /* 分组标题行 */
  tr.group-header td {
    padding: 7px 10px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    background: rgba(15, 52, 96, 0.45);
    border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  tr.group-header:hover td { background: rgba(15, 52, 96, 0.7); }
  tr.group-header:first-child td { border-top: none; }
  tr.group-header.row-ok   td:first-child { border-left: 3px solid rgba(74,222,128,0.6); }
  tr.group-header.row-warn td:first-child { border-left: 3px solid rgba(250,204,21,0.6); }
  tr.group-header.row-crit td:first-child { border-left: 3px solid rgba(248,113,113,0.6); }
  tr.group-header.row-err  td:first-child { border-left: 3px solid rgba(148,163,184,0.4); }
  .group-toggle {
    display: inline-block;
    width: 14px;
    font-size: 10px;
    transition: transform 0.15s;
  }
  tr.group-header.collapsed .group-toggle { transform: rotate(-90deg); }
  .group-count { font-size: 11px; font-weight: 400; color: var(--dim); margin-left: 4px; }

  /* 分组间隔 */
  tr.group-gap td {
    padding: 0;
    height: 8px;
    border: none;
  }

  /* 传感器详情行 */
  tr.sensor td {
    padding: 4px 10px 4px 36px;
    font-size: 12px;
    color: var(--dim);
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  tr.sensor td:first-child { padding-left: 36px; }
  tr.sensor:last-of-type td { border-bottom: 1px solid var(--border); }

  /* 状态标签 */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .badge.ok   { background: rgba(74,222,128,0.15); color: var(--ok); }
  .badge.warn { background: rgba(250,204,21,0.15); color: var(--warn); }
  .badge.crit { background: rgba(248,113,113,0.15); color: var(--crit); }
  .badge.err  { background: rgba(148,163,184,0.12); color: var(--err); }

  /* 温度颜色 */
  .temp-ok   { color: var(--text); }
  .temp-warn { color: var(--warn); }
  .temp-crit { color: var(--crit); }

  /* 展开提示箭头 */
  .expand-hint {
    display: inline-block;
    font-size: 9px;
    color: var(--dim);
    margin-left: 5px;
    opacity: 0.5;
    transition: transform 0.15s;
    vertical-align: middle;
  }
  tr.source.expanded .expand-hint { transform: rotate(180deg); opacity: 0.8; }

  /* 数据源行左侧颜色边框 */
  tr.source td:first-child { border-left: 3px solid transparent; }
  tr.source.row-ok   td:first-child { border-left-color: rgba(74,222,128,0.45); }
  tr.source.row-warn td:first-child { border-left-color: rgba(250,204,21,0.45); }
  tr.source.row-crit td:first-child { border-left-color: rgba(248,113,113,0.45); }
  tr.source.row-err  td:first-child { border-left-color: rgba(148,163,184,0.3); }

  /* 分组成员名称样式 */
  tr.source.in-group td:first-child { padding-left: 24px; color: #b0b0c8; font-size: 13px; }

  .alert-hint { font-size: 11px; color: var(--dim); margin-left: 6px; }
  .error-msg { font-size: 11px; color: var(--err); }

  /* ── 空状态 / 加载中 ─────────────────────────────────── */
  .placeholder {
    text-align: center;
    padding: 60px 24px;
    color: var(--dim);
    font-size: 14px;
  }

  /* ── 响应式 ──────────────────────────────────────────── */
  @media (max-width: 700px) {
    header, .summary, .controls, .table-wrap { padding-left: 12px; padding-right: 12px; }
    th:nth-child(3), td:nth-child(3),
    th:nth-child(4), td:nth-child(4) { display: none; }
    th:nth-child(1), td:nth-child(1) { width: 50%; }
    th:nth-child(2), td:nth-child(2) { width: 25%; }
    th:nth-child(5), td:nth-child(5) { width: 25%; }
  }
</style>
</head>
<body>

<header>
  <h1>温度监控</h1>
  <div class="meta">
    <span><span class="dot" id="statusDot"></span> <span id="statusText"></span></span>
    <span id="tsText"></span>
  </div>
</header>

<div class="summary" id="summary"></div>

<div class="controls">
  <label>刷新间隔
    <select id="refreshInterval">
      <option value="10">10 秒</option>
      <option value="30">30 秒</option>
      <option value="60" selected>60 秒</option>
      <option value="120">2 分钟</option>
      <option value="300">5 分钟</option>
      <option value="0">关闭</option>
    </select>
  </label>
  <label>JSON 文件
    <input type="text" id="jsonPath" value="readings.json" size="20">
  </label>
  <button id="refreshBtn">立即刷新</button>
  <span id="countdown"></span>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th id="sort-name">数据源</th>
        <th id="sort-temp">温度</th>
        <th id="sort-warn">警告阈值</th>
        <th id="sort-crit">严重阈值</th>
        <th id="sort-status">状态</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="placeholder" id="placeholder">加载中&hellip;</div>
</div>

<script src="translations.js"></script>
<script>window.TM_LOCALE = "zh";</script>
<script src="thermal_monitor.js"></script>
</body>
</html>
