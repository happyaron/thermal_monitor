<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Thermal Monitor</title>
<style>
  :root {
    --bg:       #1a1a2e;
    --surface:  #16213e;
    --border:   #0f3460;
    --text:     #e0e0e0;
    --dim:      #7a7a9a;
    --ok:       #4ade80;
    --warn:     #facc15;
    --crit:     #f87171;
    --err:      #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "SF Mono", "Cascadia Code", "Fira Code", Menlo, monospace;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ──────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    padding: 20px 24px 12px;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
  .meta { display: flex; gap: 20px; font-size: 12px; color: var(--dim); }
  .meta span { display: inline-flex; align-items: center; gap: 5px; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--ok); display: inline-block;
  }
  .dot.stale { background: var(--warn); }
  .dot.error { background: var(--crit); }

  /* ── Summary bar ─────────────────────────────────────── */
  .summary {
    display: flex;
    gap: 16px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    flex-wrap: wrap;
  }
  .summary .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .chip .n { font-weight: 700; font-size: 16px; }
  .chip.ok   .n { color: var(--ok); }
  .chip.warn .n { color: var(--warn); }
  .chip.crit .n { color: var(--crit); }
  .chip.err  .n { color: var(--err); }

  /* ── Controls ────────────────────────────────────────── */
  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 24px;
    font-size: 12px;
    color: var(--dim);
  }
  .controls label { display: flex; align-items: center; gap: 6px; }
  .controls select, .controls input[type=text] {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 8px;
    font-family: inherit;
    font-size: 12px;
  }
  .controls button {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 10px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
  }
  .controls button:hover { border-color: var(--text); }

  /* ── Table ───────────────────────────────────────────── */
  .table-wrap { padding: 8px 24px 24px; }
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--dim);
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  th:hover { color: var(--text); }
  /* column widths */
  th:nth-child(1), td:nth-child(1) { width: 40%; }
  th:nth-child(2), td:nth-child(2) { width: 15%; text-align: right; }
  th:nth-child(3), td:nth-child(3) { width: 12%; text-align: right; }
  th:nth-child(4), td:nth-child(4) { width: 12%; text-align: right; }
  th:nth-child(5), td:nth-child(5) { width: 21%; }

  /* source row */
  tr.source td {
    padding: 7px 10px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  tr.source:hover td { background: rgba(255,255,255,0.03); }
  tr.source.expandable { cursor: pointer; }

  /* group header row — same column grid as data rows */
  tr.group-header td {
    padding: 7px 10px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    background: rgba(15, 52, 96, 0.45);
    border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  tr.group-header:hover td { background: rgba(15, 52, 96, 0.7); }
  tr.group-header:first-child td { border-top: none; }
  /* left-border accent on group headers (same palette as source rows) */
  tr.group-header.row-ok   td:first-child { border-left: 3px solid rgba(74,222,128,0.6); }
  tr.group-header.row-warn td:first-child { border-left: 3px solid rgba(250,204,21,0.6); }
  tr.group-header.row-crit td:first-child { border-left: 3px solid rgba(248,113,113,0.6); }
  tr.group-header.row-err  td:first-child { border-left: 3px solid rgba(148,163,184,0.4); }
  .group-toggle {
    display: inline-block;
    width: 14px;
    font-size: 10px;
    transition: transform 0.15s;
  }
  tr.group-header.collapsed .group-toggle { transform: rotate(-90deg); }
  .group-count { font-size: 11px; font-weight: 400; color: var(--dim); margin-left: 4px; }

  /* group separator (between standalone clusters) */
  tr.group-gap td {
    padding: 0;
    height: 8px;
    border: none;
  }

  /* sensor detail rows */
  tr.sensor td {
    padding: 4px 10px 4px 36px;
    font-size: 12px;
    color: var(--dim);
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  tr.sensor td:first-child { padding-left: 36px; }
  tr.sensor:last-of-type td { border-bottom: 1px solid var(--border); }

  /* status badges */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .badge.ok   { background: rgba(74,222,128,0.15); color: var(--ok); }
  .badge.warn { background: rgba(250,204,21,0.15); color: var(--warn); }
  .badge.crit { background: rgba(248,113,113,0.15); color: var(--crit); }
  .badge.err  { background: rgba(148,163,184,0.12); color: var(--err); }

  /* temperature coloring */
  .temp-ok   { color: var(--text); }
  .temp-warn { color: var(--warn); }
  .temp-crit { color: var(--crit); }

  /* trailing expand hint on expandable source rows */
  .expand-hint {
    display: inline-block;
    font-size: 9px;
    color: var(--dim);
    margin-left: 5px;
    opacity: 0.5;
    transition: transform 0.15s;
    vertical-align: middle;
  }
  tr.source.expanded .expand-hint { transform: rotate(180deg); opacity: 0.8; }

  /* colored left-border accent for all source rows */
  tr.source td:first-child { border-left: 3px solid transparent; }
  tr.source.row-ok   td:first-child { border-left-color: rgba(74,222,128,0.45); }
  tr.source.row-warn td:first-child { border-left-color: rgba(250,204,21,0.45); }
  tr.source.row-crit td:first-child { border-left-color: rgba(248,113,113,0.45); }
  tr.source.row-err  td:first-child { border-left-color: rgba(148,163,184,0.3); }

  /* group member name: subdued to let the group header carry visual weight */
  tr.source.in-group td:first-child { padding-left: 24px; color: #b0b0c8; font-size: 13px; }

  .alert-hint { font-size: 11px; color: var(--dim); margin-left: 6px; }
  .error-msg { font-size: 11px; color: var(--err); }

  /* ── Empty / loading ─────────────────────────────────── */
  .placeholder {
    text-align: center;
    padding: 60px 24px;
    color: var(--dim);
    font-size: 14px;
  }

  /* ── responsive ──────────────────────────────────────── */
  @media (max-width: 700px) {
    header, .summary, .controls, .table-wrap { padding-left: 12px; padding-right: 12px; }
    th:nth-child(3), td:nth-child(3),
    th:nth-child(4), td:nth-child(4) { display: none; }
    th:nth-child(1), td:nth-child(1) { width: 50%; }
    th:nth-child(2), td:nth-child(2) { width: 25%; }
    th:nth-child(5), td:nth-child(5) { width: 25%; }
  }
</style>
</head>
<body>

<header>
  <h1>Thermal Monitor</h1>
  <div class="meta">
    <span><span class="dot" id="statusDot"></span> <span id="statusText">connecting...</span></span>
    <span id="tsText"></span>
  </div>
</header>

<div class="summary" id="summary"></div>

<div class="controls">
  <label>Refresh
    <select id="refreshInterval">
      <option value="10">10 s</option>
      <option value="30">30 s</option>
      <option value="60" selected>60 s</option>
      <option value="120">2 min</option>
      <option value="300">5 min</option>
      <option value="0">off</option>
    </select>
  </label>
  <label>JSON
    <input type="text" id="jsonPath" value="readings.json" size="20">
  </label>
  <button id="refreshBtn">Refresh now</button>
  <span id="countdown"></span>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th id="sort-name">Source</th>
        <th id="sort-temp">Temp</th>
        <th id="sort-warn">Warn</th>
        <th id="sort-crit">Crit</th>
        <th id="sort-status">Status</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="placeholder" id="placeholder">Loading&hellip;</div>
</div>

<script>
(function () {
  "use strict";

  // ── state ──────────────────────────────────────────────
  let data = null;                  // latest parsed JSON
  let timer = null;                 // setInterval id
  let nextFetch = 0;                // epoch ms of next scheduled fetch
  let expanded = new Set();         // source names with sensors expanded
  let collapsedGroups = new Set();  // group names currently collapsed
  let expandedGroups  = new Set();  // groups the user has explicitly expanded
  let sortCol = "name";
  let sortAsc = true;

  // ── DOM refs ───────────────────────────────────────────
  const $tbody       = document.getElementById("tbody");
  const $placeholder = document.getElementById("placeholder");
  const $summary     = document.getElementById("summary");
  const $statusDot   = document.getElementById("statusDot");
  const $statusText  = document.getElementById("statusText");
  const $tsText      = document.getElementById("tsText");
  const $countdown   = document.getElementById("countdown");
  const $interval    = document.getElementById("refreshInterval");
  const $jsonPath    = document.getElementById("jsonPath");
  const $refreshBtn  = document.getElementById("refreshBtn");

  // ── helpers ────────────────────────────────────────────
  const statusOrd = { OK: 0, WARN: 1, CRIT: 2, ERROR: 3 };
  const statusCls = { OK: "ok", WARN: "warn", CRIT: "crit", ERROR: "err" };

  function tempClass(status) {
    if (status === "CRIT") return "temp-crit";
    if (status === "WARN") return "temp-warn";
    return "temp-ok";
  }

  function fmtTemp(v) {
    return v == null ? "---" : v.toFixed(1) + "\u00b0C";
  }

  // ── sorting ────────────────────────────────────────────
  // When sorting by name, keep group members clustered (sort by group then name).
  function compareSources(a, b) {
    let va, vb;
    switch (sortCol) {
      case "temp":
        va = a.max_temp ?? -Infinity;
        vb = b.max_temp ?? -Infinity;
        break;
      case "warn":
        va = a.sensors.length ? Math.min(...a.sensors.filter(s=>!s.error).map(s => s.warn)) : Infinity;
        vb = b.sensors.length ? Math.min(...b.sensors.filter(s=>!s.error).map(s => s.warn)) : Infinity;
        break;
      case "crit":
        va = a.sensors.length ? Math.min(...a.sensors.filter(s=>!s.error).map(s => s.crit)) : Infinity;
        vb = b.sensors.length ? Math.min(...b.sensors.filter(s=>!s.error).map(s => s.crit)) : Infinity;
        break;
      case "status":
        va = statusOrd[a.status] ?? 0;
        vb = statusOrd[b.status] ?? 0;
        break;
      default: { // name — singles first, then groups; each bucket sorted alphabetically
        const aIsGroup = !!a.group;
        const bIsGroup = !!b.group;
        if (aIsGroup !== bIsGroup) {
          // ungrouped sources always come before grouped ones, regardless of sort direction
          return aIsGroup ? 1 : -1;
        }
        if (aIsGroup) {
          // both grouped: sort by group name, then by source name within group
          const cmp = sortAsc ? a.group.localeCompare(b.group) : b.group.localeCompare(a.group);
          if (cmp !== 0) return cmp;
        }
        return sortAsc ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name);
      }
    }
    return sortAsc ? va - vb : vb - va;
  }

  // ── render ─────────────────────────────────────────────
  function render() {
    if (!data) return;

    // Stale-data check: warn if the JSON timestamp is more than 5 min old.
    // This detects a stopped monitor script even when fetches still succeed.
    if (data.timestamp) {
      const ageMs = Date.now() - new Date(data.timestamp).getTime();
      if (ageMs > 5 * 60 * 1000) {
        $statusDot.className = "dot stale";
        $statusText.textContent = `data stale (${Math.round(ageMs / 60000)} min ago)`;
      }
    }

    // summary bar
    const s = data.summary;
    $summary.innerHTML = [
      `<span class="chip ok"><span class="n">${s.ok}</span> OK</span>`,
      s.warn  ? `<span class="chip warn"><span class="n">${s.warn}</span> WARN</span>` : "",
      s.crit  ? `<span class="chip crit"><span class="n">${s.crit}</span> CRIT</span>` : "",
      s.error ? `<span class="chip err"><span class="n">${s.error}</span> ERR</span>` : "",
      `<span class="chip"><span class="n">${s.total_sources}</span> sources</span>`,
      `<span class="chip"><span class="n">${s.total_sensors}</span> sensors</span>`,
    ].filter(Boolean).join("");

    // timestamp
    if (data.timestamp) {
      const d = new Date(data.timestamp);
      $tsText.textContent = d.toLocaleString();
    }

    const sources = [...data.sources].sort(compareSources);

    // Pre-compute group stats from JSON data.
    const groupStats = {};
    const statusLabels = ['OK', 'WARN', 'CRIT', 'ERROR'];
    for (const src of sources) {
      const grp = src.group;
      if (!grp) continue;
      if (!groupStats[grp]) groupStats[grp] = {
        count: 0, worstOrd: 0, maxPrimaryTemp: null,
        primaryWarn: null, primaryCrit: null,
        nonOkCount: 0, alertHint: null
      };
      const gs = groupStats[grp];
      gs.count++;
      gs.worstOrd = Math.max(gs.worstOrd, statusOrd[src.status] ?? 0);
      // Group primary: highest primary_temp across members + its thresholds.
      if (src.primary_temp != null && (gs.maxPrimaryTemp == null || src.primary_temp > gs.maxPrimaryTemp)) {
        gs.maxPrimaryTemp = src.primary_temp;
        gs.primaryWarn = src.primary_warn;
        gs.primaryCrit = src.primary_crit;
      }
      if ((statusOrd[src.status] ?? 0) > 0) gs.nonOkCount++;
    }
    for (const gs of Object.values(groupStats)) gs.status = statusLabels[gs.worstOrd];

    // Build group alert hints.
    for (const [grp, gs] of Object.entries(groupStats)) {
      if (gs.worstOrd === 0) continue;
      if (gs.nonOkCount > 1) {
        gs.alertHint = `${gs.nonOkCount} hosts`;
      } else if (gs.nonOkCount === 1) {
        const bad = sources.find(s => s.group === grp && (statusOrd[s.status] ?? 0) > 0);
        if (bad) {
          const short = bad.short_name || bad.name;
          gs.alertHint = bad.alert_hint ? `${short}: ${bad.alert_hint}` : short;
        }
      }
    }

    // Collapse/expand logic:
    // - OK groups: collapse by default (user can manually expand)
    // - Non-OK groups: always expand (auto-expand overrides user collapse)
    for (const [grp, gs] of Object.entries(groupStats)) {
      if (gs.worstOrd > 0) {
        // Non-OK: force expand
        collapsedGroups.delete(grp);
      } else if (!expandedGroups.has(grp)) {
        // OK + not manually expanded: collapse
        collapsedGroups.add(grp);
      }
    }

    // build rows
    const rows = [];
    let lastGroupKey = undefined;   // undefined = before first row

    for (const src of sources) {
      const grp = src.group || null;  // explicit group from JSON, or null
      // "section key": group name for grouped sources, source name for standalones
      const sectionKey = grp || src.name;

      // ── section transition ──────────────────────────────
      if (sectionKey !== lastGroupKey) {
        // Gap before a new section (except at very start)
        if (lastGroupKey !== undefined) {
          rows.push(`<tr class="group-gap"><td colspan="5"></td></tr>`);
        }
        // Named group header row with status and collapse toggle
        if (grp) {
          const gs       = groupStats[grp];
          const isCol    = collapsedGroups.has(grp);
          const colCls   = isCol ? "collapsed" : "";
          const gCls     = statusCls[gs.status];
          const gTempStr = gs.maxPrimaryTemp != null ? gs.maxPrimaryTemp.toFixed(1) + "\u00b0C" : "---";
          const gTCls    = tempClass(gs.status);
          const hintHtml = gs.alertHint
            ? ` <span class="alert-hint">(${esc(gs.alertHint)})</span>`
            : "";
          const gWarnStr = gs.primaryWarn != null ? gs.primaryWarn.toFixed(0) + "\u00b0" : "";
          const gCritStr = gs.primaryCrit != null ? gs.primaryCrit.toFixed(0) + "\u00b0" : "";
          rows.push(
            `<tr class="group-header ${colCls} row-${gCls}" data-group="${esc(grp)}">` +
            `<td><span class="group-toggle">\u25bc</span> ${esc(grp)}<span class="group-count"> · ${gs.count} hosts</span></td>` +
            `<td class="${gTCls}" style="text-align:right">${gTempStr}</td>` +
            `<td style="text-align:right">${gWarnStr}</td>` +
            `<td style="text-align:right">${gCritStr}</td>` +
            `<td><span class="badge ${gCls}">${gs.status}</span>${hintHtml}</td>` +
            `</tr>`
          );
        }
        lastGroupKey = sectionKey;
      }

      // Skip member rows when their group is collapsed.
      if (grp && collapsedGroups.has(grp)) continue;

      // Auto-expand sensor detail for non-OK sources.
      const isNonOk   = (statusOrd[src.status] ?? 0) > 0;
      const isExp     = expanded.has(src.name) || isNonOk;
      const cls       = statusCls[src.status];
      const hasDetail = src.sensors.length > 0;
      const expandable = hasDetail ? "expandable" : "";
      const expCls    = isExp ? "expanded" : "";
      const inGroup   = grp ? "in-group" : "";

      // Display name: short_name within a group, full name for standalones
      const displayName = src.short_name || src.name;

      const expandHint = hasDetail
        ? `<span class="expand-hint">\u25be</span>`
        : ``;

      // Use primary_temp (ambient inlet) for the TEMP column.
      const tempStr = src.primary_temp != null ? fmtTemp(src.primary_temp) : fmtTemp(src.max_temp);
      const tCls    = tempClass(src.status);

      // Inline alert hint when alert source differs from primary sensor.
      let hintHtml = "";
      if (src.alert_hint)
        hintHtml = ` <span class="alert-hint">(${esc(src.alert_hint)})</span>`;

      let errSnippet = "";
      if (src.primary_temp == null && src.max_temp == null && src.sensors.length) {
        const errSensor = src.sensors.find(s => s.error);
        if (errSensor) errSnippet = ` <span class="error-msg">${esc(errSensor.error)}</span>`;
      }

      const rowStatusCls = `row-${cls}`;

      const pWarn = src.primary_warn != null ? src.primary_warn.toFixed(0) + "\u00b0" : "";
      const pCrit = src.primary_crit != null ? src.primary_crit.toFixed(0) + "\u00b0" : "";

      rows.push(
        `<tr class="source ${expandable} ${expCls} ${inGroup} ${rowStatusCls}" data-src="${esc(src.name)}">` +
        `<td>${esc(displayName)}${expandHint}</td>` +
        `<td class="${tCls}">${tempStr}</td>` +
        `<td>${pWarn}</td>` +
        `<td>${pCrit}</td>` +
        `<td><span class="badge ${cls}">${src.status}</span>${hintHtml}${errSnippet}</td>` +
        `</tr>`
      );

      // sensor detail rows
      if (isExp && hasDetail) {
        for (const sn of src.sensors) {
          const sCls  = statusCls[sn.status];
          const sv    = sn.value != null ? sn.value.toFixed(1) + "\u00b0C" : "---";
          const stCls = tempClass(sn.status);
          const errMsg = sn.error ? ` <span class="error-msg">${esc(sn.error)}</span>` : "";
          rows.push(
            `<tr class="sensor">` +
            `<td>${esc(sn.name)}</td>` +
            `<td class="${stCls}">${sv}</td>` +
            `<td>${sn.warn.toFixed(0)}\u00b0</td>` +
            `<td>${sn.crit.toFixed(0)}\u00b0</td>` +
            `<td><span class="badge ${sCls}">${sn.status}</span>${errMsg}</td>` +
            `</tr>`
          );
        }
      }
    }

    $tbody.innerHTML = rows.join("");
    $placeholder.style.display = rows.length ? "none" : "";

    // auto-expand non-OK sources on first load
    if (expanded.size === 0 && data.sources.some(s => s.status !== "OK")) {
      for (const src of data.sources) {
        if (src.status !== "OK") expanded.add(src.name);
      }
      render();
    }
  }

  function esc(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  // ── fetch ──────────────────────────────────────────────
  async function fetchData() {
    const path = $jsonPath.value.trim() || "readings.json";
    try {
      const resp = await fetch(path + "?_=" + Date.now());
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      data = await resp.json();
      $statusDot.className = "dot";
      $statusText.textContent = "connected";
      render();
    } catch (e) {
      $statusDot.className = "dot error";
      $statusText.textContent = "fetch failed: " + e.message;
    }
  }

  // ── auto-refresh ───────────────────────────────────────
  function scheduleRefresh() {
    if (timer) clearInterval(timer);
    const sec = parseInt($interval.value, 10);
    if (sec <= 0) {
      $countdown.textContent = "(paused)";
      return;
    }
    nextFetch = Date.now() + sec * 1000;
    timer = setInterval(() => {
      if (Date.now() >= nextFetch) {
        fetchData();
        nextFetch = Date.now() + sec * 1000;
      }
      const left = Math.max(0, Math.ceil((nextFetch - Date.now()) / 1000));
      $countdown.textContent = `next in ${left}s`;
    }, 1000);
  }

  // ── events ─────────────────────────────────────────────
  $tbody.addEventListener("click", (e) => {
    const groupRow = e.target.closest("tr.group-header");
    if (groupRow) {
      const grp = groupRow.dataset.group;
      if (collapsedGroups.has(grp)) {
        collapsedGroups.delete(grp);
        expandedGroups.add(grp);
      } else {
        collapsedGroups.add(grp);
        expandedGroups.delete(grp);
      }
      render();
      return;
    }
    const row = e.target.closest("tr.source.expandable");
    if (!row) return;
    const name = row.dataset.src;
    if (expanded.has(name)) expanded.delete(name);
    else expanded.add(name);
    render();
  });

  document.querySelectorAll("th[id^='sort-']").forEach(th => {
    th.addEventListener("click", () => {
      const col = th.id.replace("sort-", "");
      if (sortCol === col) sortAsc = !sortAsc;
      else { sortCol = col; sortAsc = true; }
      render();
    });
  });

  $interval.addEventListener("change", scheduleRefresh);
  $refreshBtn.addEventListener("click", () => { fetchData(); scheduleRefresh(); });

  // read ?refresh=N and ?json=path from URL
  const params = new URLSearchParams(location.search);
  if (params.has("refresh")) {
    const v = parseInt(params.get("refresh"), 10);
    for (const opt of $interval.options) {
      if (parseInt(opt.value, 10) === v) { opt.selected = true; break; }
    }
  }
  if (params.has("json")) {
    $jsonPath.value = params.get("json");
  }

  // ── init ───────────────────────────────────────────────
  fetchData();
  scheduleRefresh();
})();
</script>
</body>
</html>
